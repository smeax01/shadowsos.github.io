<div class="h-full flex flex-col bg-[#0d0d0d] text-zinc-300 font-sans overflow-hidden select-none" id="ide-app-${__winId}">
  
  <!-- Top Bar -->
  <div class="h-9 bg-[#1a1a1a] border-b border-zinc-800/50 flex items-center px-4 shrink-0 z-20">
    <div class="flex gap-4 text-[11px] font-medium text-zinc-400">
      <div class="relative group">
        <span class="hover:text-white cursor-pointer px-1 py-2">Fichier</span>
        <div class="absolute left-0 top-full mt-0 w-48 bg-[#1e1e1e] border border-zinc-800 py-1 shadow-2xl hidden group-hover:block z-50 rounded-sm">
          <div class="px-3 py-1.5 hover:bg-blue-600 hover:text-white cursor-pointer flex items-center justify-between" id="menu-new-file-${__winId}">
            <span>Nouveau Fichier</span>
            <span class="opacity-50 text-[9px]">Ctrl+N</span>
          </div>
          <div class="px-3 py-1.5 hover:bg-blue-600 hover:text-white cursor-pointer flex items-center justify-between" id="menu-new-folder-${__winId}">
            <span>Nouveau Dossier</span>
          </div>
          <div class="h-[1px] bg-zinc-800 my-1"></div>
          <div class="px-3 py-1.5 hover:bg-blue-600 hover:text-white cursor-pointer flex items-center justify-between" id="menu-save-${__winId}">
            <span>Enregistrer</span>
            <span class="opacity-50 text-[9px]">Ctrl+S</span>
          </div>
          <div class="h-[1px] bg-zinc-800 my-1"></div>
          <div class="px-3 py-1.5 hover:bg-rose-600 hover:text-white cursor-pointer" onclick="window.wm.closeWindow('${__winId}')">
            <span>Fermer l'Éditeur</span>
          </div>
        </div>
      </div>
      <span class="hover:text-white cursor-pointer px-1 py-2 opacity-50">Édition</span>
      <span class="hover:text-white cursor-pointer px-1 py-2 opacity-50">Sélection</span>
      <span class="hover:text-white cursor-pointer px-1 py-2 opacity-50">Affichage</span>
    </div>
    <div class="ml-auto flex items-center gap-3">
        <button id="ide-run-${__winId}" class="flex items-center gap-1.5 px-3 py-1 bg-emerald-600/20 hover:bg-emerald-600/40 text-emerald-400 rounded text-[10px] font-bold uppercase tracking-wider transition-all border border-emerald-500/20">
            <i data-lucide="play" class="w-3 h-3"></i> Exécuter
        </button>
    </div>
  </div>

  <div class="flex flex-1 overflow-hidden">
    
    <!-- Sidebar Explorer -->
    <div class="w-64 bg-[#111111] border-r border-zinc-900 flex flex-col shrink-0 overflow-hidden">
      <div class="h-9 flex items-center justify-between px-4 text-[10px] font-black tracking-[0.2em] text-zinc-500 uppercase border-b border-zinc-900">
        Explorateur
        <div class="flex gap-2">
            <i data-lucide="file-plus" class="w-3.5 h-3.5 hover:text-white cursor-pointer" id="side-new-file-${__winId}"></i>
            <i data-lucide="folder-plus" class="w-3.5 h-3.5 hover:text-white cursor-pointer" id="side-new-folder-${__winId}"></i>
        </div>
      </div>
      
      <div id="ide-file-list-${__winId}" class="flex-1 overflow-y-auto py-2">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col bg-[#050505] overflow-hidden">
      <!-- Tabs -->
      <div class="h-9 bg-[#111111] flex items-center overflow-x-auto shrink-0 border-b border-zinc-900" id="ide-tabs-${__winId}">
         <!-- Tabs rendered by JS -->
      </div>
      
      <!-- Editor Area -->
      <div class="flex-1 flex flex-col overflow-hidden relative">
          <div class="flex-1 flex font-mono text-[13px] leading-relaxed relative" id="ide-editor-container-${__winId}">
             <div class="w-12 bg-[#0d0d0d] border-r border-zinc-900 text-right text-zinc-600 py-4 pr-3 select-none flex flex-col gap-0.5 shrink-0 overflow-hidden" id="ide-gutters-${__winId}">
               1
             </div>
             <textarea class="flex-1 bg-transparent border-none text-zinc-300 p-4 resize-none outline-none whitespace-pre focus:ring-0 selection:bg-blue-500/30 overflow-auto" id="ide-editor-${__winId}" spellcheck="false" wrap="off"></textarea>
             
             <!-- Empty State -->
             <div id="ide-empty-${__winId}" class="absolute inset-0 bg-[#050505] flex flex-col items-center justify-center text-zinc-800 hidden">
                <i data-lucide="code-2" class="w-16 h-16 mb-4 opacity-10"></i>
                <span class="text-xs font-semibold tracking-widest text-zinc-600 uppercase">Aucun fichier ouvert</span>
             </div>
          </div>

          <!-- Execution Panel (Hidden by default) -->
          <div id="ide-output-panel-${__winId}" class="h-40 bg-[#0a0a0a] border-t border-zinc-800 flex flex-col hidden">
              <div class="h-7 bg-[#141414] px-4 flex items-center justify-between border-b border-zinc-900">
                  <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Sortie / Console</span>
                  <button class="text-zinc-600 hover:text-white" id="ide-close-out-${__winId}"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
              </div>
              <div id="ide-output-content-${__winId}" class="flex-1 overflow-y-auto p-3 font-mono text-xs text-zinc-400 whitespace-pre-wrap"></div>
          </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    const root = document.getElementById(`ide-app-${__winId}`);
    const fileListEl = document.getElementById(`ide-file-list-${__winId}`);
    const tabsEl = document.getElementById(`ide-tabs-${__winId}`);
    const editorEl = document.getElementById(`ide-editor-${__winId}`);
    const guttersEl = document.getElementById(`ide-gutters-${__winId}`);
    const emptyEl = document.getElementById(`ide-empty-${__winId}`);
    const runBtn = document.getElementById(`ide-run-${__winId}`);
    const outPanel = document.getElementById(`ide-output-panel-${__winId}`);
    const outContent = document.getElementById(`ide-output-content-${__winId}`);
    
    let activeFileId = null;
    let openFiles = [];
    let currentFolderId = __contextId || 'documents';

    function initIDE() {
      if (!window.vfs) {
        setTimeout(initIDE, 100);
        return;
      }
      renderExplorer();
      
      // Setup listeners (avoid onclick attribute)
      document.getElementById(`side-new-file-${__winId}`).onclick = promptNewFile;
      document.getElementById(`side-new-folder-${__winId}`).onclick = promptNewFolder;
      document.getElementById(`menu-new-file-${__winId}`).onclick = promptNewFile;
      document.getElementById(`menu-new-folder-${__winId}`).onclick = promptNewFolder;
      document.getElementById(`menu-save-${__winId}`).onclick = saveCurrent;
      document.getElementById(`ide-close-out-${__winId}`).onclick = () => outPanel.classList.add('hidden');
      
      // Keybinds
      root.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveCurrent(); }
          if (e.ctrlKey && e.key === 'n') { e.preventDefault(); promptNewFile(); }
      });
    }

    function renderExplorer() {
      const children = window.vfs.getChildren(currentFolderId);
      const parent = window.vfs.getItem(currentFolderId);
      
      let html = '';
      if (parent && parent.parentId) {
          html += `
            <div class="flex items-center gap-2 px-4 py-1 hover:bg-zinc-800/40 cursor-pointer text-zinc-500 italic mb-1 navigate-up">
                <i data-lucide="arrow-up-left" class="w-3.5 h-3.5"></i>
                <span class="text-xs">..</span>
            </div>
          `;
      }

      children.sort((a,b) => (a.type === 'folder' ? -1 : 1)).forEach(item => {
        const icon = window.vfs.getIconForFile(item);
        const isOpen = activeFileId === item.id;
        html += `
          <div class="flex items-center gap-2 px-4 py-1 hover:bg-zinc-800/40 cursor-pointer group item-row ${isOpen ? 'bg-zinc-800 text-white' : 'text-zinc-400'}" 
               data-id="${item.id}" data-type="${item.type}">
            <i data-lucide="${icon}" class="w-3.5 h-3.5 ${item.type === 'folder' ? 'text-amber-400' : 'text-zinc-500'}"></i>
            <span class="text-xs truncate transition-colors">${item.name}</span>
          </div>
        `;
      });
      
      fileListEl.innerHTML = html;
      if (window.lucide) window.lucide.createIcons({ root });
      
      // Add event delegation
      fileListEl.querySelectorAll('.navigate-up').forEach(el => {
          el.onclick = () => { currentFolderId = parent.parentId; renderExplorer(); };
      });
      fileListEl.querySelectorAll('.item-row').forEach(el => {
          el.onclick = () => {
              const { id, type } = el.dataset;
              if (type === 'folder') { currentFolderId = id; renderExplorer(); }
              else { openFile(id); }
          };
      });
    }

    function openFile(id) {
        const item = window.vfs.getItem(id);
        if (!item || item.type !== 'file') return;
        if (!openFiles.includes(id)) openFiles.push(id);
        activeFileId = id;
        renderTabs();
        loadActiveFile();
    }

    function closeFile(id) {
        openFiles = openFiles.filter(f => f !== id);
        if (activeFileId === id) activeFileId = openFiles[openFiles.length - 1] || null;
        renderTabs();
        loadActiveFile();
    }

    function renderTabs() {
        tabsEl.innerHTML = openFiles.map(id => {
            const item = window.vfs.getItem(id);
            const isActive = activeFileId === id;
            return `
                <div class="h-full flex items-center gap-2 px-3 border-r border-zinc-900 cursor-pointer group transition-all tab-item ${isActive ? 'bg-[#050505] text-white border-t-2 border-t-blue-500' : 'bg-[#111111] text-zinc-500 hover:text-zinc-300'}" 
                     data-id="${id}">
                    <span class="text-[11px] font-medium truncate max-w-[120px]">${item ? item.name : 'Inconnu'}</span>
                    <i data-lucide="x" class="w-3 h-3 text-zinc-600 hover:text-white rounded-sm p-0.5 opacity-0 group-hover:opacity-100 tab-close" data-id="${id}"></i>
                </div>
            `;
        }).join('');
        if (window.lucide) window.lucide.createIcons({ root });
        
        tabsEl.querySelectorAll('.tab-item').forEach(el => {
            el.onclick = () => openFile(el.dataset.id);
        });
        tabsEl.querySelectorAll('.tab-close').forEach(el => {
            el.onclick = (e) => { e.stopPropagation(); closeFile(el.dataset.id); };
        });
    }

    function loadActiveFile() {
        if (!activeFileId) {
            emptyEl.classList.remove('hidden');
            editorEl.value = '';
            updateLines();
            return;
        }
        emptyEl.classList.add('hidden');
        const item = window.vfs.getItem(activeFileId);
        editorEl.value = item.content || '';
        updateLines();
        editorEl.focus();
    }

    function updateLines() {
        const lines = editorEl.value.split('\n').length;
        guttersEl.innerHTML = Array.from({length: lines}, (_, i) => `<div>${i+1}</div>`).join('');
        guttersEl.scrollTop = editorEl.scrollTop;
    }

    function saveCurrent() {
        if (activeFileId) {
            window.vfs.updateContent(activeFileId, editorEl.value);
            console.log("VFS: Saved " + activeFileId);
        }
    }

    editorEl.addEventListener('input', () => {
        if (activeFileId) {
            window.vfs.updateContent(activeFileId, editorEl.value);
            updateLines();
        }
    });

    editorEl.addEventListener('scroll', () => { guttersEl.scrollTop = editorEl.scrollTop; });

    editorEl.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = editorEl.selectionStart;
            editorEl.value = editorEl.value.substring(0, start) + '  ' + editorEl.value.substring(editorEl.selectionEnd);
            editorEl.selectionStart = editorEl.selectionEnd = start + 2;
            editorEl.dispatchEvent(new Event('input'));
        }
    });

    runBtn.onclick = () => {
        if (!activeFileId) return;
        const item = window.vfs.getItem(activeFileId);
        const ext = item.name.split('.').pop().toLowerCase();
        outPanel.classList.remove('hidden');
        outContent.innerHTML = '';
        
        if (ext === 'html') {
            const winId = 'preview-' + activeFileId;
            window.wm.openWindow(winId);
            setTimeout(() => {
                const winEl = document.getElementById(`window-element-${winId}`);
                if (winEl) {
                    const content = winEl.querySelector('.window-content');
                    content.innerHTML = `<iframe srcdoc="${item.content.replace(/"/g, '&quot;')}" class="w-full h-full bg-white"></iframe>`;
                }
            }, 300);
            log("Lancement de la prévisualisation HTML...");
        } else if (ext === 'js') {
            log("Exécution du script via Smeax Engine...");
            try {
                const fakeConsole = {
                    log: (...args) => log(args.join(' ')),
                    error: (...args) => log('ERR: ' + args.join(' '))
                };
                const fn = new Function('console', item.content);
                fn(fakeConsole);
                log("\n--- Terminé avec succès ---");
            } catch (err) { log('CRASH: ' + err.message); }
        } else { log("L'exécution n'est pas supportée pour ce type de fichier (" + ext + ")"); }
    };

    function log(msg) {
        outContent.innerHTML += msg + '\n';
        outContent.scrollTop = outContent.scrollHeight;
    }

    function promptNewFile() {
        const name = prompt("Nom du fichier:");
        if (name) { 
            const id = window.vfs.createFile(name, 'file', '', currentFolderId);
            renderExplorer();
            openFile(id);
        }
    }

    function promptNewFolder() {
        const name = prompt("Nom du dossier:");
        if (name) { 
            window.vfs.createFolder(name, currentFolderId);
            renderExplorer();
        }
    }

    window.addEventListener('vfs-changed', renderExplorer);
    initIDE();
  })();
</script>
