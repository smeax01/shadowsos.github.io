<div class="flex flex-col h-full w-full bg-black text-zinc-300 font-sans text-sm pb-10 items-center justify-center p-4 relative group" id="video-app-${__winId}">
  <video id="video-player-${__winId}" class="w-full h-full object-contain rounded outline-none" controls autoplay>
    <source src="" type="video/mp4" id="video-source-${__winId}">
    Votre navigateur ne supporte pas la balise vidéo.
  </video>
</div>

<script>
  (function() {
    const fileId = __contextId;
    const player = document.getElementById(`video-player-${__winId}`);
    const source = document.getElementById(`video-source-${__winId}`);
    
    if (fileId && window.vfs) {
      const file = window.vfs.getItem(fileId);
      if (file && file.content) {
        // Handle arbitrary types if possible
        const type = file.type === "video/webm" ? "video/webm" : "video/mp4";
        source.src = file.content;
        source.type = type;
        player.load();
      }
    }
  })();
</script>
