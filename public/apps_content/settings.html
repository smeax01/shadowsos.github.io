<div class="h-full flex flex-col md:flex-row bg-[#121212] text-white font-sans overflow-hidden border-t border-zinc-900" id="settings-app">
  
  <!-- Sidebar -->
  <div class="w-full md:w-64 bg-[#181818] border-r border-zinc-800 flex flex-col overflow-y-auto shrink-0 transition-colors">
    <div class="p-6 pb-2">
      <h2 class="text-xl font-black text-white tracking-tight flex items-center gap-3">
        <i data-lucide="settings" class="w-5 h-5 text-zinc-400"></i> Paramètres
      </h2>
    </div>
    
    <div class="p-4 flex flex-col gap-1 text-sm font-semibold">
      <button class="settings-tab active flex items-center gap-3 w-full p-3 rounded-md bg-zinc-800/80 text-white transition-colors text-left group">
        <i data-lucide="palette" class="w-4 h-4 text-zinc-400 group-hover:text-white transition-colors"></i> Personnalisation
      </button>
    </div>
  </div>

  <!-- Content Area -->
  <div class="flex-1 p-8 lg:p-12 overflow-y-auto bg-[#121212]">
    
    <div class="max-w-3xl">
      <h3 class="text-2xl font-bold mb-8 text-white">Apparence</h3>
      
      <!-- Setting Group -->
      <div class="bg-[#1a1a1a] border border-zinc-800 rounded-md overflow-hidden mb-8 shadow-sm">
        
        <!-- Toggle Mode -->
        <div id="theme-toggle-btn" class="flex flex-col sm:flex-row sm:items-center justify-between p-6 border-b border-zinc-800/50 hover:bg-[#202020] transition-colors cursor-pointer group">
          <div class="flex items-start md:items-center gap-4 mb-4 sm:mb-0">
            <div class="p-2.5 bg-zinc-900 border border-zinc-700 rounded-md shadow-inner">
              <i data-lucide="sun-moon" class="w-5 h-5 text-indigo-400"></i>
            </div>
            <div>
              <p class="font-bold text-white leading-tight">Thème Clair / Sombre</p>
              <p class="text-xs text-zinc-500 mt-1">Activer le mode lumineux</p>
            </div>
          </div>
          <!-- Switch -->
          <div id="theme-switch" class="relative w-12 h-6 bg-zinc-700 rounded-full cursor-pointer shadow-inner shrink-0 group-active:scale-95 transition-all">
            <div id="theme-knob" class="absolute left-1 top-1 w-4 h-4 bg-zinc-400 rounded-full shadow-md transition-all"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  (function() {
    if (window.lucide) {
      window.lucide.createIcons();
    }
    
    const themeBtn = document.getElementById("theme-toggle-btn");
    const themeSwitch = document.getElementById("theme-switch");
    const themeKnob = document.getElementById("theme-knob");
    
    // Check current theme from localStorage instead of body class, because iframe is inverted by parent
    const isLightMode = localStorage.getItem("shadowos_theme") === "light";
    
    // Track internal state so toggle works without relying on parent class
    let lightModeState = isLightMode;

    const updateUI = (light) => {
      if (light) {
        themeSwitch.classList.replace("bg-zinc-700", "bg-indigo-600");
        themeKnob.classList.replace("bg-zinc-400", "bg-white");
        themeKnob.style.transform = "translateX(24px)";
      } else {
        themeSwitch.classList.replace("bg-indigo-600", "bg-zinc-700");
        themeKnob.classList.replace("bg-white", "bg-zinc-400");
        themeKnob.style.transform = "translateX(0px)";
      }
    };
    
    updateUI(lightModeState);
    
    themeBtn.addEventListener("click", () => {
      lightModeState = !lightModeState;
      const willBeLight = lightModeState;
      
      localStorage.setItem("shadowos_theme", willBeLight ? "light" : "dark");
      
      // Notify parent to apply invert filter immediately
      if (window.parent) {
        window.parent.postMessage({ type: 'THEME_CHANGED', theme: willBeLight ? "light" : "dark" }, '*');
      }
      
      updateUI(willBeLight);
    });
  })();
</script>
