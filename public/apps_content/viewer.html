<div class="flex flex-col h-full w-full bg-zinc-950 text-zinc-300 font-sans text-sm items-center justify-center p-4" id="viewer-app-${__winId}">
  <img id="viewer-img-${__winId}" class="max-w-full max-h-full object-contain rounded drop-shadow-2xl" src="" alt="Image">
</div>

<script>
  (function() {
    const fileId = __contextId;
    const img = document.getElementById(`viewer-img-${__winId}`);
    
    if (fileId && window.vfs) {
      const file = window.vfs.getItem(fileId);
      if (file && file.content) {
        img.src = file.content;
      }
    }
  })();
</script>
