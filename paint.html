<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowOS Paint</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  canvas { touch-action: none; }
  .glass {
    backdrop-filter: blur(14px);
    background: rgba(255,255,255,0.08);
  }
</style>
</head>
<body class="bg-[#0a0a0a] text-white overflow-hidden">

<!-- HEADER -->
<div class="fixed top-0 left-0 w-full h-14 glass border-b border-white/10 flex items-center px-4 justify-between z-50">
  <div class="flex items-center gap-3">
    <span class="text-lg font-semibold">ShadowOS Paint</span>
  </div>

  <div class="flex items-center gap-3">
    <button id="importImage"
      class="px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-md transition">Importer une image</button>

    <button id="clearCanvas"
      class="px-3 py-1.5 bg-red-500/70 hover:bg-red-500 rounded-md transition">Effacer</button>
  </div>
</div>

<!-- SIDEBAR GAUCHE -->
<div class="fixed left-0 top-14 w-16 h-[calc(100vh-3.5rem)] glass border-r border-white/10 flex flex-col items-center py-4 gap-4 z-40">

  <!-- Couleur -->
  <input type="color" id="colorPicker"
    class="w-10 h-10 rounded-md p-0 border-0 cursor-pointer">

  <!-- Opacité -->
  <input type="range" id="opacityPicker" min="0.1" max="1" step="0.01" value="1"
    class="w-12 h-2 rotate-[-90deg] accent-purple-500">

  <!-- Taille -->
  <input type="range" id="sizePicker" min="1" max="50" value="8"
    class="w-12 h-2 rotate-[-90deg] accent-blue-500">

  <!-- Gomme -->
  <button id="eraserBtn"
    class="w-10 h-10 flex items-center justify-center bg-white/10 hover:bg-white/20 rounded-md">
    🧹
  </button>

  <!-- Zoom -->
  <input type="range" id="zoomPicker" min="0.5" max="3" step="0.01" value="1"
    class="w-12 h-2 rotate-[-90deg] accent-green-500">

</div>

<!-- CONTAINER -->
<div class="absolute left-16 top-14 w-[calc(100vw-4rem)] h-[calc(100vh-3.5rem)] overflow-hidden">

  <div id="canvasWrapper"
    class="w-full h-full overflow-scroll bg-white rounded-lg shadow-xl">

    <canvas id="canvas" class="bg-white block mx-auto"></canvas>

  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const wrapper = document.getElementById("canvasWrapper");

let drawing = false;
let color = "#000000";
let size = 8;
let opacity = 1;
let erasing = false;
let zoom = 1;

function resizeCanvas() {
  canvas.width = 2000;
  canvas.height = 1200;

  loadAutoSave();
}

resizeCanvas();

/* ---- OUTILS ---- */
document.getElementById("colorPicker").addEventListener("input", e => {
  color = e.target.value;
  erasing = false;
});

document.getElementById("sizePicker").addEventListener("input", e => {
  size = e.target.value;
});

document.getElementById("opacityPicker").addEventListener("input", e => {
  opacity = e.target.value;
});

document.getElementById("eraserBtn").addEventListener("click", () => {
  erasing = !erasing;
});

document.getElementById("zoomPicker").addEventListener("input", e => {
  zoom = e.target.value;
  canvas.style.transform = `scale(${zoom})`;
  canvas.style.transformOrigin = "top left";
});

/* ---- CLEAR ---- */
document.getElementById("clearCanvas").addEventListener("click", () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  saveAuto();
});

/* ---- IMPORT IMAGE ---- */
document.getElementById("importImage").addEventListener("click", () => {
  let input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = e => {
    let file = e.target.files[0];
    let img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = URL.createObjectURL(file);
  };
  input.click();
});

/* ---- DESSIN ---- */
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) / zoom,
    y: (e.clientY - rect.top) / zoom
  };
}

function start(e) {
  drawing = true;
  draw(e);
}

function stop() {
  drawing = false;
  ctx.beginPath();
  saveAuto();
}

function draw(e) {
  if (!drawing) return;

  const pos = getPos(e);

  ctx.lineWidth = size;
  ctx.lineCap = "round";
  ctx.globalAlpha = opacity;
  ctx.strokeStyle = erasing ? "white" : color;

  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

/* Souris */
canvas.addEventListener("mousedown", start);
canvas.addEventListener("mouseup", stop);
canvas.addEventListener("mousemove", draw);

/* Touch */
canvas.addEventListener("touchstart", e => start(e.touches[0]));
canvas.addEventListener("touchend", stop);
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  draw(e.touches[0]);
});

/* ---- AUTOSAVE ---- */
function saveAuto() {
  localStorage.setItem("shadowos_paint", canvas.toDataURL());
}

function loadAutoSave() {
  const data = localStorage.getItem("shadowos_paint");
  if (!data) return;

  let img = new Image();
  img.onload = () => ctx.drawImage(img, 0, 0);
  img.src = data;
}

</script>

</body>
</html>
