<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau Blanc Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Quadrillage pointillé style cahier pro */
        #board {
            background-size: 25px 25px;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.15) 2px, transparent 2px);
        }
    </style>
</head>

<body class="bg-gray-900 text-white h-screen overflow-hidden">

    <!-- Barre outils -->
    <div class="fixed left-0 top-0 h-full w-20 bg-gray-800 border-r border-gray-700 flex flex-col items-center py-4 space-y-4 z-50">

        <!-- Pinceau -->
        <button id="tool-pencil"
            class="w-12 h-12 bg-gray-700 hover:bg-gray-600 rounded flex items-center justify-center">
            ✏️
        </button>

        <!-- Gomme -->
        <button id="tool-eraser"
            class="w-12 h-12 bg-gray-700 hover:bg-gray-600 rounded flex items-center justify-center">
            🧽
        </button>

        <!-- Tailles -->
        <input id="size" type="range" min="1" max="40" value="5"
               class="w-14 rotate-90 mt-4 accent-blue-500">

        <!-- Couleurs -->
        <div class="flex flex-col space-y-2 mt-4">
            <button class="color w-8 h-8 rounded-full bg-white" data-color="#ffffff"></button>
            <button class="color w-8 h-8 rounded-full bg-red-500" data-color="#ef4444"></button>
            <button class="color w-8 h-8 rounded-full bg-blue-500" data-color="#3b82f6"></button>
            <button class="color w-8 h-8 rounded-full bg-green-500" data-color="#10b981"></button>
            <button class="color w-8 h-8 rounded-full bg-yellow-500" data-color="#facc15"></button>
        </div>

        <!-- Tout effacer -->
        <button id="clear"
            class="w-12 h-12 mt-auto bg-red-600 hover:bg-red-500 rounded flex items-center justify-center">
            ❌
        </button>

    </div>

    <!-- Canvas -->
    <canvas id="board" class="absolute left-20 top-0 w-[calc(100%-5rem)] h-full"></canvas>

    <script>
        const canvas = document.getElementById("board");
        const ctx = canvas.getContext("2d");

        // resize canvas to screen
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        // tools
        let drawing = false;
        let color = "#ffffff";
        let size = 5;
        let erasing = false;

        const startDraw = (x, y) => {
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(x, y);
        };

        const draw = (x, y) => {
            if (!drawing) return;

            ctx.lineWidth = size;
            ctx.lineCap = "round";
            ctx.strokeStyle = erasing ? "#ffffff00" : color;
            ctx.globalCompositeOperation = erasing ? "destination-out" : "source-over";

            ctx.lineTo(x, y);
            ctx.stroke();
        };

        const stopDraw = () => {
            drawing = false;
            ctx.closePath();
        };

        // Souris
        canvas.addEventListener("mousedown", e => startDraw(e.offsetX, e.offsetY));
        canvas.addEventListener("mousemove", e => draw(e.offsetX, e.offsetY));
        window.addEventListener("mouseup", stopDraw);

        // Tablette / tactile
        canvas.addEventListener("touchstart", e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            startDraw(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        canvas.addEventListener("touchmove", e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            draw(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        canvas.addEventListener("touchend", stopDraw);

        // Boutons outils
        document.getElementById("tool-pencil").onclick = () => {
            erasing = false;
        };

        document.getElementById("tool-eraser").onclick = () => {
            erasing = true;
        };

        // Tailles
        document.getElementById("size").oninput = e => {
            size = e.target.value;
        };

        // Couleurs
        document.querySelectorAll(".color").forEach(btn => {
            btn.onclick = () => {
                color = btn.dataset.color;
                erasing = false;
            };
        });

        // Effacer tout
        document.getElementById("clear").onclick = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };
    </script>

</body>
</html>
