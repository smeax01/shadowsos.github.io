<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau Blanc Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Fond quadrillage pointillé */
        #board {
            background-size: 20px 20px;
            background-image: radial-gradient(circle, rgba(255,255,255,0.12) 1.5px, transparent 1.5px);
        }

        /* Effet verre / blur */
        .glass {
            backdrop-filter: blur(12px);
            background: rgba(40,40,40,0.45);
        }
    </style>
</head>

<body class="bg-gray-900 text-white h-screen overflow-hidden flex flex-col">

    <!-- HEADER (fichiers) -->
    <header class="glass w-full p-3 border-b border-gray-700 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <button id="newFile" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 rounded-md">Nouveau</button>
            <button id="openFile" class="px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded-md">Ouvrir image</button>
            <input id="fileInput" type="file" accept="image/*" class="hidden">
            <button id="saveFile" class="px-3 py-2 bg-green-600 hover:bg-green-700 rounded-md">Exporter PNG</button>
        </div>

        <span class="opacity-50 text-sm">Whiteboard Smeax</span>
    </header>

    <div class="flex flex-1">

        <!-- BARRE À GAUCHE (outils) -->
        <aside class="glass w-20 h-full border-r border-gray-700 flex flex-col items-center py-4 space-y-4">

            <!-- Pinceau -->
            <button id="tool-pencil"
                class="tool w-12 h-12 glass rounded-lg flex items-center justify-center">
                ✏️
            </button>

            <!-- Gomme -->
            <button id="tool-eraser"
                class="tool w-12 h-12 glass rounded-lg flex items-center justify-center">
                🧽
            </button>

            <!-- Couleur -->
            <input id="colorPicker" type="color"
                   class="w-12 h-12 rounded-lg border-0 bg-transparent cursor-pointer">

            <!-- Opacité -->
            <input id="opacity" type="range" min="0.1" max="1" step="0.05" value="1"
                   class="w-16 rotate-90 accent-blue-500">

            <!-- Taille -->
            <input id="size" type="range" min="1" max="40" value="5"
                   class="w-16 rotate-90 accent-blue-500">

            <!-- Effacer -->
            <button id="clear"
                class="w-12 h-12 mt-auto bg-red-600 hover:bg-red-500 rounded-lg flex items-center justify-center">
                ❌
            </button>

        </aside>

        <!-- CANVAS -->
        <canvas id="board" class="flex-1 h-full"></canvas>

    </div>

<script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        loadAutoSave();
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    let drawing = false;
    let tool = "pencil";
    let color = "#ffffff";
    let opacity = 1;
    let size = 5;

    function startDraw(x, y) {
        drawing = true;
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function draw(x, y) {
        if (!drawing) return;

        ctx.lineWidth = size;
        ctx.lineCap = "round";
        ctx.strokeStyle = color;
        ctx.globalAlpha = opacity;

        ctx.globalCompositeOperation = tool === "eraser" ? "destination-out" : "source-over";
        ctx.lineTo(x, y);
        ctx.stroke();

        autoSave();
    }

    function stopDraw() {
        drawing = false;
        ctx.closePath();
        autoSave();
    }

    // Souris
    canvas.addEventListener("mousedown", e => startDraw(e.offsetX, e.offsetY));
    canvas.addEventListener("mousemove", e => draw(e.offsetX, e.offsetY));
    window.addEventListener("mouseup", stopDraw);

    // Tactile
    canvas.addEventListener("touchstart", e => {
        e.preventDefault();
        const t = e.touches[0];
        const r = canvas.getBoundingClientRect();
        startDraw(t.clientX - r.left, t.clientY - r.top);
    });

    canvas.addEventListener("touchmove", e => {
        e.preventDefault();
        const t = e.touches[0];
        const r = canvas.getBoundingClientRect();
        draw(t.clientX - r.left, t.clientY - r.top);
    });

    canvas.addEventListener("touchend", stopDraw);

    // OUTILS
    document.getElementById("tool-pencil").onclick = () => tool = "pencil";
    document.getElementById("tool-eraser").onclick = () => tool = "eraser";

    document.getElementById("colorPicker").oninput = e => {
        color = e.target.value;
        tool = "pencil";
    };

    document.getElementById("size").oninput = e => size = e.target.value;
    document.getElementById("opacity").oninput = e => opacity = e.target.value;

    // Effacer tout
    document.getElementById("clear").onclick = () => {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        autoSave();
    };

    // SAUVEGARDE AUTO
    function autoSave() {
        localStorage.setItem("whiteboard_smeax", canvas.toDataURL());
    }

    function loadAutoSave() {
        const save = localStorage.getItem("whiteboard_smeax");
        if (!save) return;
        const img = new Image();
        img.src = save;
        img.onload = () => ctx.drawImage(img, 0, 0);
    }

    // EXPORT PNG
    document.getElementById("saveFile").onclick = () => {
        const link = document.createElement("a");
        link.download = "whiteboard.png";
        link.href = canvas.toDataURL();
        link.click();
    };

    // NOUVEAU
    document.getElementById("newFile").onclick = () => {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        localStorage.removeItem("whiteboard_smeax");
    };

    // OUVERTURE IMAGE
    document.getElementById("openFile").onclick = () =>
        document.getElementById("fileInput").click();

    document.getElementById("fileInput").onchange = e => {
        const file = e.target.files[0];
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = () => {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            autoSave();
        };
    };

</script>

</body>
</html>
