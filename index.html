<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="theme-color" content="#0d111e" />
<link rel="icon" href="/assets/img/shadowos-icon.png" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShadowOS - Beta</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/assets/styles/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


</head>
<body>

<div class="wallpaper" aria-hidden="true"></div>

<!-- Desktop layer -->
<div id="desktop" aria-hidden="false"></div>
<div id="selection-box" aria-hidden="true"></div>

<div id="window-area" class="absolute inset-0 pointer-events-auto"></div>

<div id="start-menu" aria-hidden="true">
  <div class="start-header">
    <div class="start-user">
      <img src="/assets/img/shadowos-icon.png" alt="Avatar" />
      <div>
        <div class="text-white font-semibold">Smeax</div>
        <div class="text-sm text-gray-300">Connecté</div>
      </div>
    </div>

    <div class="flex gap-2 items-center">
      <div class="relative">
        <button id="start-power" title="Options d'alimentation" class="p-2 rounded-md hover:bg-white/3">
          <i class="bi bi-power text-lg text-red-400"></i>
        </button>
        <div id="start-power-menu" class="absolute right-0 mt-2 w-44 bg-[#0b0d10] border border-white/5 rounded-md p-2 hidden">
          <button class="w-full text-left px-3 py-2 rounded hover:bg-white/2" onclick="fakeAction('Redémarrer')">🔁 Redémarrer</button>
          <button class="w-full text-left px-3 py-2 rounded hover:bg-white/2" onclick="fakeAction('Arrêter')">⏻ Éteindre</button>
          <button class="w-full text-left px-3 py-2 rounded hover:bg-white/2" onclick="fakeAction('Se déconnecter')">↩ Se déconnecter</button>
        </div>
      </div>
    </div>
  </div>

  <h3 class="text-sm text-gray-200 mb-2">Applications</h3>
  <div id="start-grid" class="start-grid">
    <!-- apps will be injected here -->
  </div>
</div>

<div id="taskbar" role="toolbar" aria-label="Barre des tâches">
  <div class="taskbar-left">
    <button id="btn-start" class="taskbar-button" title="Démarrer" onclick="toggleStartMenu()">
      <img src="/assets/img/shadowos-icon.png" alt="Start" />
    </button>

    <div class="relative hidden md:block">
      <input id="searchTask" type="text"
             class="w-60 md:w-72 lg:w-96 px-3 py-2 bg-[#0f1317] text-white rounded-lg text-sm"
             placeholder="Rechercher sur Searx..." onkeypress="if(event.key==='Enter') searchFromTaskbar()">
      <i class="bi bi-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-300"></i>
    </div>
  </div>

  <div class="taskbar-center">
    <div id="pinned-strip" class="pinned-strip">

      <!-- pinned apps (default) -->
      <button class="taskbar-button" data-app="Exploreur" onclick="toggleWindow('Exploreur','Exploreur','explorer.html')">
        <img src="https://images.icon-icons.com/37/PNG/512/books_3025.png" alt="Explorateur" />
      </button>

      <button class="taskbar-button" data-app="Searx" onclick="toggleWindow('Searx','Searx','https://metasearx.com')">
        <img src="https://images.icon-icons.com/1826/PNG/512/4202108browsereedgelogo-115709_115592.png" alt="Searx" />
      </button>

      <button class="taskbar-button" data-app="Terminal" onclick="toggleWindow('Terminal','Terminal','/cmd.html')">
        <img src="https://img.icons8.com/?size=100&id=hvZ4mmbc3mTK&format=png&color=FFFFFF" alt="Terminal" />
      </button>
    </div>

    <div id="overflowBtn" class="overflow-btn ml-2 hidden" title="Plus d'apps">
      <i class="bi bi-three-dots-vertical text-white/80"></i>
    </div>
  </div>

    <div id="tray-clock" class="tray-clock" title="Afficher le menu" onclick="toggleTrayMenu()">
      <div>
        <div class="time text-white text-sm" id="tray-time">--:--</div>
        <div class="date text-gray-300" id="tray-date">--</div>
      </div>
    </div>
  </div>
</div>

<div id="tray-menu" aria-hidden="true">
  <div class="tray-user">
    <img src="/assets/img/shadowos-icon.png" alt="Avatar" />
    <div>
      <div class="text-white font-semibold">Smeax</div>
      <div class="text-sm text-gray-300">Europe/Paris</div>
    </div>
  </div>

  <div class="text-sm text-gray-200 mb-2" id="tray-fulltime">--:--:--</div>
</div>

<script>
/* State */
let zIndex = 50;
const openedApps = {};
const pinnedStrip = document.getElementById('pinned-strip');
const overflowBtn = document.getElementById('overflowBtn');
const startMenu = document.getElementById('start-menu');
const startGrid = document.getElementById('start-grid');
const startPower = document.getElementById('start-power');
const startPowerMenu = document.getElementById('start-power-menu');
const trayMenu = document.getElementById('tray-menu');
const trayClock = document.getElementById('tray-clock');
const trayTimeEl = document.getElementById('tray-time');
const trayDateEl = document.getElementById('tray-date');
const trayFullTime = document.getElementById('tray-fulltime');
const taskbar = document.getElementById('taskbar');
const root = document.documentElement;
const desktop = document.getElementById('desktop');
const selectionBox = document.getElementById('selection-box');

let appsList = []; // loaded app objects

/* Utility: fetch JSON with graceful fallback */
async function fetchJson(url){
  try {
    const r = await fetch(url, {cache: "no-cache"});
    if (!r.ok) throw new Error('fetch error ' + r.status);
    return await r.json();
  } catch (err) {
    console.warn('fetchJson failed', url, err);
    return null;
  }
}

/* Load apps:
   - expects /apps/apps.json : ["app1.shdw","app2.shdw"]
   - each file is JSON .shdw with fields: key, name, version, description, icon, url, target
*/
async function loadApps(){
  const manifest = await fetchJson('/apps/apps.json');
  let files = manifest && Array.isArray(manifest) ? manifest : null;

  // fallback: check /apps/index.json or attempt to load a few defaults if manifest missing
  if (!files){
    const fallback = await fetchJson('/apps/index.json');
    if (fallback && Array.isArray(fallback)) files = fallback;
  }

  // if still no manifest, use an embedded sample set (useful for dev/local)
  if (!files){
    files = [
      "minecraft.shdw",
      "explorer.shdw"
    ];
    console.warn('Aucun manifest trouvé (/apps/apps.json). Utilisation d\'un fallback interne. Pour production, crée /apps/apps.json listant les .shdw');
  }

  const loaded = [];
  for (const f of files) {
    if (!f) continue;
    const path = '/apps/' + f;
    const data = await fetchJson(path);
    if (data) {
      // normalize minimal fields and default target
      const app = {
        key: data.key || (data.name || f).toLowerCase().replace(/\s+/g,'-'),
        name: data.name || f,
        version: data.version || '1.0',
        description: data.description || '',
        icon: data.icon || '/assets/img/shadowos-icon.png',
        url: data.url || '/',
        target: data.target || 'iframe', // iframe or newtab
        file: f,
        raw: data
      };
      loaded.push(app);
    } else {
      console.warn('Impossible de charger', path);
    }
  }

  appsList = loaded;
  renderStartGrid();
  renderDesktopIcons();
}

/* render the start menu grid */
function renderStartGrid(){
  startGrid.innerHTML = '';
  appsList.forEach(app => {
    const el = document.createElement('div');
    el.className = 'app';
    el.title = app.description;
    el.innerHTML = `<img src="${app.icon}" alt="${app.name}"><div class="text-white text-xs">${app.name}</div>`;
    el.onclick = () => {
      toggleWindow(app.key, app.name, app.url, app);
      startMenu.classList.remove('active');
    };
    // allow right-click to pin to taskbar
    el.oncontextmenu = (e) => {
      e.preventDefault();
      pinApp(app.icon, app.key, app.name, app);
    };
    startGrid.appendChild(el);
  });
}

/* Render desktop icons (grid-like auto placement) */
function renderDesktopIcons(){
  desktop.innerHTML = ''; // clear
  const margin = 24;
  const iconW = 92;
  const iconH = 110;
  // compute columns based on width
  const cols = Math.max(1, Math.floor((window.innerWidth - margin*2) / (iconW + 12)));
  appsList.forEach((app, idx) => {
    const x = margin + (idx % cols) * (iconW + 12);
    const y = margin + Math.floor(idx / cols) * (iconH + 12);
    const el = document.createElement('div');
    el.className = 'desktop-icon';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.dataset.appKey = app.key;
    el.innerHTML = `<div class="ico"><img src="${app.icon}" alt="${app.name}" style="width:100%;height:100%;object-fit:cover;"></div><div class="label">${app.name}</div>`;
    el.onclick = (ev) => {
      // single click: select; double click open
      if (ev.detail === 1) {
        clearSelection();
        el.classList.add('selected');
      } else if (ev.detail === 2) {
        toggleWindow(app.key, app.name, app.url, app);
      }
    };
    // allow drag to move icons on desktop (simple)
    makeDesktopIconDraggable(el);
    desktop.appendChild(el);
  });
}

/* make desktop icon draggable (simple) */
function makeDesktopIconDraggable(el){
  let dragging = false, sx=0, sy=0, ox=0, oy=0;
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true;
    sx = e.clientX; sy = e.clientY;
    ox = parseFloat(el.style.left); oy = parseFloat(el.style.top);
    el.style.transition = 'none';
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    el.style.left = Math.max(8, Math.min(window.innerWidth - 100, ox + (e.clientX - sx))) + 'px';
    el.style.top = Math.max(8, Math.min(window.innerHeight - 120, oy + (e.clientY - sy))) + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      el.style.transition = '';
    }
  });
}

/* toggle window creation / toggle visibility */
function toggleWindow(key, title, url, appObj){
  const keyAttr = key;
  if (openedApps[keyAttr]) {
    const win = openedApps[keyAttr];
    if (win.style.display === "none") {
      win.style.display = "flex";
      win.style.zIndex = ++zIndex;
      document.querySelector(`[data-app="${keyAttr}"]`)?.classList.add("active");
      win.focus?.();
    } else {
      win.style.display = "none";
      document.querySelector(`[data-app="${keyAttr}"]`)?.classList.remove("active");
    }
    return;
  }

  const container = document.getElementById("window-area");
  const win = document.createElement("div");
  win.className = "window";
  win.style.zIndex = ++zIndex;
  win.dataset.appKey = keyAttr;

  // default size
  const width = Math.min(1200, Math.max(420, Math.floor(window.innerWidth * 0.7)));
  const height = Math.min(800, Math.max(300, Math.floor(window.innerHeight * 0.7)));
  win.style.width = width + "px";
  win.style.height = height + "px";
  win.style.left = (window.innerWidth/2 - width/2) + "px";
  win.style.top = (window.innerHeight/2 - height/2) + "px";

  // choose iframe or external
  let content = '';
  const src = url || '/';
  const safeSandbox = 'allow-same-origin allow-scripts allow-forms allow-modals';
  content += `
    <div class="window-header">
      <span class="text-sm">${title}</span>
      <div class="flex gap-3 text-xl">
        <i class="bi bi-dash cursor-pointer" onclick="minimizeWindow(this)"></i>
        <i class="bi bi-arrows-fullscreen cursor-pointer" onclick="toggleFullscreen(this)"></i>
        <i class="bi bi-x-lg text-red-400 cursor-pointer" onclick="closeWindow(this)"></i>
      </div>
    </div>
  `;

  // if target is newtab, open in external tab
  const target = appObj?.target || 'iframe';
  if (target === 'newtab' || /^https?:\/\//i.test(src) && appObj?.target === 'newtab') {
    window.open(src, '_blank');
    return;
  } else {
    content += `<iframe src="${src}" class="flex-1 w-full" sandbox="${safeSandbox}"></iframe>`;
  }

  content += `<div class="resize-handle absolute right-0 bottom-0 w-6 h-6 cursor-se-resize"></div>`;

  win.innerHTML = content;
  container.appendChild(win);
  openedApps[keyAttr] = win;

  // highlight pinned if present
  document.querySelector(`[data-app="${keyAttr}"]`)?.classList.add("active");

  makeWindowDraggable(win);
  makeWindowResizable(win);

  adjustTaskbarScale();
}

/* window controls */
function closeWindow(btn) {
  const win = btn.closest(".window");
  if (!win) return;
  const key = win.dataset.appKey;
  document.querySelector(`[data-app="${key}"]`)?.classList.remove("active");
  delete openedApps[key];
  win.remove();
  adjustTaskbarScale();
}

function minimizeWindow(btn) {
  const win = btn.closest(".window");
  if (!win) return;
  win.style.display = "none";
  document.querySelector(`[data-app="${win.dataset.appKey}"]`)?.classList.remove("active");
  adjustTaskbarScale();
}

function toggleFullscreen(btn) {
  const win = btn.closest(".window");
  if (!win) return;
  if (!win.dataset.fullscreen) {
    win.dataset.prev = JSON.stringify({
      left: win.style.left,
      top: win.style.top,
      width: win.style.width,
      height: win.style.height
    });
    win.style.left = "0";
    win.style.top = "0";
    win.style.width = "100vw";
    win.style.height = "100vh";
    win.dataset.fullscreen = "1";
  } else {
    const prev = JSON.parse(win.dataset.prev);
    win.style.left = prev.left;
    win.style.top = prev.top;
    win.style.width = prev.width;
    win.style.height = prev.height;
    win.removeAttribute("data-fullscreen");
  }
}

/* draggable windows */
function makeWindowDraggable(win) {
  const header = win.querySelector(".window-header");
  let dragging = false, offsetX = 0, offsetY = 0;

  header.addEventListener("mousedown", e => {
    dragging = true;
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
    win.style.zIndex = ++zIndex;
  });

  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    if (win.dataset.fullscreen) return;
    win.style.left = (e.clientX - offsetX) + "px";
    win.style.top = (e.clientY - offsetY) + "px";
  });

  document.addEventListener("mouseup", () => dragging = false);
}

/* resizable windows */
function makeWindowResizable(win) {
  const h = win.querySelector(".resize-handle");
  let resizing = false, sx, sy, sw, sh;
  h.addEventListener("mousedown", e => {
    resizing = true;
    sx = e.clientX;
    sy = e.clientY;
    sw = win.offsetWidth;
    sh = win.offsetHeight;
    win.style.zIndex = ++zIndex;
    e.preventDefault();
  });
  document.addEventListener("mousemove", e => {
    if (!resizing) return;
    win.style.width = Math.max(360, sw + (e.clientX - sx)) + "px";
    win.style.height = Math.max(220, sh + (e.clientY - sy)) + "px";
  });
  document.addEventListener("mouseup", () => resizing = false);
}

/* start menu toggle */
function toggleStartMenu() {
  startMenu.classList.toggle('active');
  trayMenu.classList.remove('active');
}

/* global click handling */
document.addEventListener('click', (e) => {
  if (!startMenu.contains(e.target) && !document.getElementById('btn-start').contains(e.target)) {
    startMenu.classList.remove('active');
  }
  if (!startPower.contains(e.target) && !startPowerMenu.contains(e.target)) {
    startPowerMenu.classList.add('hidden');
  }
  if (!trayMenu.contains(e.target) && !trayClock.contains(e.target)) {
    trayMenu.classList.remove('active');
  }
});

/* start power menu toggle */
startPower.addEventListener('click', (e) => {
  e.stopPropagation();
  startPowerMenu.classList.toggle('hidden');
});

function fakeAction(name){
  alert(name + ' (action de démo)');
}

/* taskbar scaling logic */
function adjustTaskbarScale(){
  requestAnimationFrame(() => {
    const center = document.querySelector('.taskbar-center');
    const pinned = pinnedStrip;
    const available = center.clientWidth - 48;

    const icons = Array.from(pinned.children);
    if (!icons.length) {
      root.style.setProperty('--taskbar-scale', '1');
      overflowBtn.classList.add('hidden');
      return;
    }

    const sampleIcon = icons[0].getBoundingClientRect().width;
    const gap = parseFloat(getComputedStyle(root).getPropertyValue('--icon-gap')) || 8;
    const baseIconW = sampleIcon || 40;
    const totalRequired = icons.length * baseIconW + (icons.length - 1) * gap;

    let scale = Math.min(1, available / Math.max(1, totalRequired));
    scale = Math.max(scale, 0.66);

    root.style.setProperty('--taskbar-scale', String(scale));
    if (totalRequired * scale > available + 6) {
      overflowBtn.classList.remove('hidden');
    } else {
      overflowBtn.classList.add('hidden');
    }
  });
}

overflowBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  showOverflowMenu();
});

function showOverflowMenu(){
  let existing = document.getElementById('overflow-menu');
  if (existing) {
    existing.remove();
    return;
  }

  const menu = document.createElement('div');
  menu.id = 'overflow-menu';
  menu.style.position = 'absolute';
  menu.style.bottom = (parseFloat(getComputedStyle(taskbar).bottom) + parseFloat(getComputedStyle(taskbar).height || '64') + 10) + 'px';
  menu.style.left = (overflowBtn.getBoundingClientRect().left) + 'px';
  menu.style.background = 'rgba(12,14,16,0.98)';
  menu.style.border = '1px solid rgba(255,255,255,0.04)';
  menu.style.padding = '8px';
  menu.style.borderRadius = '8px';
  menu.style.boxShadow = '0 18px 50px rgba(0,0,0,0.6)';
  menu.style.zIndex = 999999;

  const icons = Array.from(pinnedStrip.children);
  icons.forEach(ic => {
    const label = ic.getAttribute('data-app') || 'App';
    const el = document.createElement('div');
    el.className = 'flex items-center gap-2 p-2 rounded hover:bg-white/2';
    el.style.cursor = 'pointer';
    el.innerHTML = `<div style="width:28px;height:28px;overflow:hidden;border-radius:6px">${ic.innerHTML}</div><div style="color:#fff;margin-left:6px">${label}</div>`;
    el.onclick = () => {
      const app = ic.getAttribute('data-app') || label;
      ic.click();
      menu.remove();
    };
    menu.appendChild(el);
  });

  document.body.appendChild(menu);

  const closeFn = (ev) => {
    if (!menu.contains(ev.target)) {
      menu.remove();
      document.removeEventListener('click', closeFn);
    }
  };
  document.addEventListener('click', closeFn);
}

new ResizeObserver(adjustTaskbarScale).observe(document.getElementById('taskbar'));
const observer = new MutationObserver(adjustTaskbarScale);
observer.observe(pinnedStrip, { childList: true, subtree: false });

adjustTaskbarScale();

/* clock */
function updateClock(){
  const now = new Date();
  const optsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: 'Europe/Paris' };
  const optsShort = { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Europe/Paris' };
  const optsDate = { weekday: 'short', day:'2-digit', month:'short', timeZone: 'Europe/Paris' };

  const timeStr = new Intl.DateTimeFormat('fr-FR', optsShort).format(now);
  const timeFull = new Intl.DateTimeFormat('fr-FR', optsTime).format(now);
  const dateStr = new Intl.DateTimeFormat('fr-FR', optsDate).format(now);

  trayTimeEl.textContent = timeStr;
  trayDateEl.textContent = dateStr;
  trayFullTime.textContent = timeFull + ' — ' + new Intl.DateTimeFormat('fr-FR', { weekday: 'long', day:'numeric', month:'long', year:'numeric', timeZone: 'Europe/Paris' }).format(now);
}
updateClock();
setInterval(updateClock, 1000);

function toggleTrayMenu(){
  const active = trayMenu.classList.toggle('active');
  startMenu.classList.remove('active');
}

/* search */
function searchFromTaskbar(){
  const q = document.getElementById("searchTask").value.trim();
  if (!q) return;
  toggleWindow("Searx", "Searx", "https://metasearx.com//?q=" + encodeURIComponent(q));
}

/* keyboard interactions */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    startMenu.classList.remove('active');
    trayMenu.classList.remove('active');
    const overflow = document.getElementById('overflow-menu');
    if (overflow) overflow.remove();
  }
});

/* pin app helper */
function pinApp(src, key, title, appObj){
  // check if already pinned
  if (Array.from(pinnedStrip.children).some(n => n.dataset.app === key)) return;
  const btn = document.createElement('button');
  btn.className = 'taskbar-button';
  btn.dataset.app = key;
  btn.title = title || key;
  btn.innerHTML = `<img src="${src}" alt="${title || key}">`;
  btn.onclick = () => toggleWindow(key, title || key, appObj?.url || '/');
  pinnedStrip.appendChild(btn);
  adjustTaskbarScale();
}

/* selection rectangle logic on desktop */
let selecting = false;
let selStartX=0, selStartY=0;

function clearSelection(){
  document.querySelectorAll('.desktop-icon.selected').forEach(el => el.classList.remove('selected'));
}

desktop.addEventListener('mousedown', (e) => {
  // only left button and not on an icon
  if (e.button !== 0) return;
  if (e.target.closest('.desktop-icon')) return;
  selecting = true;
  selStartX = e.clientX;
  selStartY = e.clientY;
  selectionBox.style.left = selStartX + 'px';
  selectionBox.style.top = selStartY + 'px';
  selectionBox.style.width = '0px';
  selectionBox.style.height = '0px';
  selectionBox.style.display = 'block';
  clearSelection();
});

window.addEventListener('mousemove', (e) => {
  if (!selecting) return;
  const x = Math.min(e.clientX, selStartX);
  const y = Math.min(e.clientY, selStartY);
  const w = Math.abs(e.clientX - selStartX);
  const h = Math.abs(e.clientY - selStartY);
  selectionBox.style.left = x + 'px';
  selectionBox.style.top = y + 'px';
  selectionBox.style.width = w + 'px';
  selectionBox.style.height = h + 'px';

  // check intersection with desktop icons
  const rect = { left: x, top: y, right: x + w, bottom: y + h };
  document.querySelectorAll('.desktop-icon').forEach(ic => {
    const r = ic.getBoundingClientRect();
    const intersect = !(r.right < rect.left || r.left > rect.right || r.bottom < rect.top || r.top > rect.bottom);
    if (intersect) ic.classList.add('selected'); else ic.classList.remove('selected');
  });
});

window.addEventListener('mouseup', (e) => {
  if (selecting) {
    selecting = false;
    selectionBox.style.display = 'none';
  }
});

/* click on desktop to clear selection */
desktop.addEventListener('click', (e) => {
  if (e.target === desktop || e.target === document.querySelector('.wallpaper')) {
    clearSelection();
  }
});

/* make icons droppable into pinned strip (quick pin by drag onto taskbar) */
desktop.addEventListener('dragstart', (e) => {});
// Note: full DnD complex behavior omitted for brevity - simple right-click pin supported.

/* startup: load apps */
loadApps();

/* handle window resize re-render desktop layout */
window.addEventListener('resize', () => {
  renderDesktopIcons();
  adjustTaskbarScale();
});

/* Developer helper: expose appsList on window for debug */
window._shadowos = { appsList };

/* End of script */
</script>

</body>
</html>
